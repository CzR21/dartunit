name: dartunit
description: An architecture testing tool for Dart and Flutter projects, inspired by ArchUnit.
version: 1.0.0
repository: https://github.com/CzR21/dartunit/tree/main/package
issue_tracker: https://github.com/CzR21/dartunit/issues

environment:
  sdk: ^3.0.0

dependencies:
  args: ^2.5.0
  path: ^1.9.0
  glob: ^2.1.2
  analyzer: ">=6.4.1 <11.0.0"
  ansi_styles: ^0.3.0
  mason_logger: ^0.3.2
  test: ^1.24.0

dev_dependencies:
  lints: ^3.0.0

executables:
  dartunit: dartunit
