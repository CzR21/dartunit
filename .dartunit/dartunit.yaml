# dartunit.yaml — Architecture rules for this project
# Run "dartunit analyze" to evaluate these rules.
# Run "dartunit generate <rule_name>" to scaffold a custom rule.
#
# Documentation: .dartunit/README.md

rules:

  # ── Domain cannot depend on Data ────────────────────────────────────────
  - id: R001
    description: Domain layer must not depend on Data layer
    severity: error
    selector:
      type: class
      where:
        folder: lib/domain
    predicate:
      not:
        type: dependOnFolder
        value: lib/data

  # ── Repository implementations must live in lib/data ────────────────────
  - id: R002
    description: Repository implementations must reside in lib/data
    severity: error
    selector:
      type: class
      where:
        namePattern: ".*RepositoryImpl$"
    predicate:
      type: dependOnFolder
      value: lib/data

  # ── God-class guard ──────────────────────────────────────────────────────
  - id: R003
    description: Classes must have at most 10 methods
    severity: warning
    selector:
      type: class
    predicate:
      type: maxMethods
      value: 10

  # ── No circular imports ──────────────────────────────────────────────────
