name: dartunit
description: An architecture testing tool for Dart and Flutter projects, inspired by ArchUnit.
version: 0.1.0
repository: https://github.com/your-org/dartunit

environment:
  sdk: ^3.0.0

dependencies:
  args: ^2.5.0
  yaml: ^3.1.2
  path: ^1.9.0
  glob: ^2.1.2
  analyzer: ^6.4.1
  ansi_styles: ^0.3.0

dev_dependencies:
  lints: ^3.0.0
  test: ^1.24.0

executables:
  dartunit: dartunit
